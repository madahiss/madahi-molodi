<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مداحی و مولودی</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#0d0d0d;
    color:#fff;
}

header{
    background:linear-gradient(to bottom,#7a0000,#000);
    padding:50px 20px;
    text-align:center;
    border-bottom:4px solid #b30000;
}

header h1{
    font-size:38px;
    color:white;
}

header h2{
    color:#ff4444;
    margin-top:10px;
    font-size:26px;
}

.search{
    text-align:center;
    margin:30px;
}

.search input{
    width:90%;
    max-width:500px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    background:#222;
    color:white;
}

.section-title{
    text-align:center;
    color:#ff4444;
    margin:35px 0 15px;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1b1b1b;
    border:2px solid #990000;
    border-radius:15px;
    padding:25px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:red;
    box-shadow:0 0 20px red;
}

.card a{
    color:white;
    text-decoration:none;
    font-size:22px;
    display:block;
}

footer{
    text-align:center;
    padding:25px;
    background:#111;
    margin-top:40px;
    color:#888;
}
</style>

</head>
<body>

<header>
<h1>السلام علیک یا اباعبدالله</h1>
<h2>🎙 مداحی و مولودی</h2>
</header>

<div class="search">
<input type="text" placeholder="جستجوی مداحی...">
</div>

<h2 class="section-title">دسته‌بندی‌ها</h2>

<div class="grid">

<div class="card">
<a href="#">🟥 محرم</a>
</div>

<div class="card">
<a href="#">🟥 اربعین</a>
</div>

<div class="card">
<a href="#">🟥 حماسی</a>
</div>

</div>

<h2 class="section-title">مداحان</h2>

<div class="grid">

<div class="card">
<a href="#">🎤 حسین طاهری</a>
</div>

<div class="card">
<a href="#">🎤 محمود کریمی</a>
</div>

<div class="card">
<a href="#">🎤 مرتضی یبرنژاد</a>
</div>

<div class="card">
<a href="#">🎤 مهدی رسولی</a>
</div>

</div>

<footer>
مداحی و مولودی © 2026
</footer>

</body>
</html>
