<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آرشیو مداحی</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#111;
    color:white;
    text-align:center;
}

header{
    background:#000;
    padding:20px;
    border-bottom:3px solid gold;
}

h1{
    color:gold;
}

.card{
    background:#1d1d1d;
    width:300px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
}

a{
    display:block;
    margin:10px;
    padding:12px;
    background:gold;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

a:hover{
    background:#ffd700;
}
</style>

</head>
<body>

<header>
<h1>🎙 آرشیو مداحی</h1>
<p>به سایت مداحی خوش آمدید</p>
</header>

<div class="card">
<h2>محرم</h2>
<a href="#">شب اول</a>
<a href="#">شب دوم</a>
<a href="#">شب سوم</a>
</div>

<div class="card">
<h2>ولادت</h2>
<a href="#">میلاد امام علی (ع)</a>
<a href="#">میلاد امام حسین (ع)</a>
</div>

<div class="card">
<h2>فاطمیه</h2>
<a href="#">دهه اول</a>
<a href="#">دهه دوم</a>
</div>

</body>
</html>
